name: Release

on:
  push:
    tags:
      - "v*"

# id-token: write is required for npm Trusted Publishing (OIDC).
# The short-lived token is minted at publish time; no NPM_TOKEN secret is stored.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # The "npm-publish" GitHub Environment must exist on this repo and match the
    # environment name configured in the package's npmjs.com Trusted Publisher
    # settings. Reviewers configured on this environment act as a human gate
    # before each publish.
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.28.2
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm compile

      - run: pnpm test

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - run: pnpm publish --no-git-checks --access public --provenance
